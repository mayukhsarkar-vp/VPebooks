<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velvet Pages — Fine Digital Literature</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --parchment: #EDE5D0;
    --dark: #1A1208;
    --brown: #2C1810;
    --gold: #B8860B;
    --gold-light: #D4A843;
    --gold-pale: #F0D080;
    --burgundy: #6B1A2A;
    --ink: #0D0A05;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background-color: var(--cream);
    color: var(--dark);
    font-family: 'EB Garamond', Georgia, serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom Cursor */
  .cursor {
    width: 12px; height: 12px;
    background: var(--gold);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.15s ease;
    mix-blend-mode: multiply;
  }
  .cursor-ring {
    width: 40px; height: 40px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none;
    z-index: 9998;
    transition: transform 0.3s ease, width 0.2s, height 0.2s;
  }
  .cursor-ring.hover { width: 60px; height: 60px; border-color: var(--burgundy); }

  /* Noise Texture Overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.5;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 500;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.5rem 4rem;
    background: rgba(245,240,232,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(184,134,11,0.25);
    transition: all 0.4s ease;
  }
  nav.scrolled {
    padding: 1rem 4rem;
    background: rgba(245,240,232,0.97);
    box-shadow: 0 4px 30px rgba(26,18,8,0.1);
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--dark);
    letter-spacing: 0.05em;
    text-decoration: none;
  }
  .nav-logo span { color: var(--gold); font-style: italic; }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dark);
    text-decoration: none;
    position: relative;
    transition: color 0.3s;
  }
  .nav-links a::after {
    content: ''; position: absolute; bottom: -3px; left: 0; right: 0;
    height: 1px; background: var(--gold); transform: scaleX(0);
    transform-origin: left; transition: transform 0.3s ease;
  }
  .nav-links a:hover { color: var(--gold); }
  .nav-links a:hover::after { transform: scaleX(1); }
  .cart-btn {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--cream); background: var(--dark);
    border: none; padding: 0.6rem 1.4rem;
    cursor: none; transition: all 0.3s;
    position: relative; overflow: hidden;
  }
  .cart-btn::after {
    content: ''; position: absolute; inset: 0;
    background: var(--gold); transform: translateX(-101%);
    transition: transform 0.3s ease;
  }
  .cart-btn:hover::after { transform: translateX(0); }
  .cart-btn span { position: relative; z-index: 1; }
  .cart-count {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px;
    background: var(--burgundy); color: white;
    border-radius: 50%; font-size: 0.65rem; margin-left: 6px;
    font-family: 'Playfair Display', serif;
  }

  /* ─── HERO ─── */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 8rem 2rem 4rem;
    position: relative;
    background:
      radial-gradient(ellipse 80% 50% at 50% 30%, rgba(184,134,11,0.08) 0%, transparent 70%),
      linear-gradient(180deg, #F5F0E8 0%, #EDE5D0 100%);
    overflow: hidden;
  }
  .hero-ornament {
    font-size: 1rem; letter-spacing: 0.4em;
    color: var(--gold); text-transform: uppercase;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    display: flex; align-items: center; gap: 1rem;
    animation: fadeUp 1s ease 0.2s both;
  }
  .hero-ornament::before, .hero-ornament::after {
    content: ''; display: block; width: 60px; height: 1px; background: var(--gold);
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(4rem, 10vw, 9rem);
    font-weight: 900;
    line-height: 0.9;
    color: var(--dark);
    margin: 1.5rem 0;
    animation: fadeUp 1s ease 0.4s both;
  }
  .hero h1 em { color: var(--gold); font-style: italic; display: block; }
  .hero-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.1rem, 2vw, 1.5rem);
    font-weight: 300;
    font-style: italic;
    color: var(--brown);
    max-width: 600px;
    line-height: 1.7;
    margin: 0 auto 2.5rem;
    animation: fadeUp 1s ease 0.6s both;
  }
  .hero-cta {
    display: flex; gap: 1.2rem; justify-content: center; flex-wrap: wrap;
    animation: fadeUp 1s ease 0.8s both;
  }
  .btn-primary {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--cream); background: var(--dark);
    border: none; padding: 1rem 2.5rem;
    cursor: none; text-decoration: none;
    position: relative; overflow: hidden;
    transition: color 0.3s;
  }
  .btn-primary::before {
    content: ''; position: absolute; inset: 0;
    background: var(--burgundy); transform: scaleX(0);
    transform-origin: left; transition: transform 0.4s ease;
  }
  .btn-primary:hover::before { transform: scaleX(1); }
  .btn-primary span { position: relative; z-index: 1; }
  .btn-secondary {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--dark);
    border: 1px solid var(--gold);
    padding: 1rem 2.5rem;
    cursor: none; text-decoration: none;
    transition: all 0.3s;
    background: transparent;
  }
  .btn-secondary:hover { background: var(--gold); color: var(--cream); }

  /* Decorative lines */
  .hero-deco {
    position: absolute; inset: 0; pointer-events: none;
    animation: fadeIn 2s ease 1s both;
  }
  .hero-deco svg { width: 100%; height: 100%; }

  .scroll-indicator {
    position: absolute; bottom: 2rem;
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    animation: fadeIn 2s ease 1.5s both;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold);
  }
  .scroll-line {
    width: 1px; height: 60px; background: linear-gradient(to bottom, var(--gold), transparent);
    animation: scrollPulse 2s ease infinite;
  }

  /* ─── ABOUT ─── */
  .about {
    padding: 8rem 4rem;
    max-width: 1400px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 1fr; gap: 6rem;
    align-items: center;
  }
  .section-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem; font-weight: 600;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 1rem;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 4vw, 4rem);
    font-weight: 700; line-height: 1.1;
    color: var(--dark); margin-bottom: 2rem;
  }
  .section-title em { font-style: italic; color: var(--burgundy); }
  .about-text p {
    font-family: 'EB Garamond', serif;
    font-size: 1.15rem; line-height: 1.9;
    color: var(--brown); margin-bottom: 1.5rem;
  }
  .about-visual {
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .about-card {
    background: var(--dark);
    padding: 3rem;
    position: relative;
    box-shadow: 20px 20px 0 var(--gold);
  }
  .about-card::before {
    content: '';
    position: absolute; inset: 12px;
    border: 1px solid rgba(184,134,11,0.4);
  }
  .about-card-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem; font-style: italic;
    color: var(--cream); line-height: 1.5;
    text-align: center;
  }
  .about-card-text span { color: var(--gold-light); }
  .about-stats {
    display: flex; gap: 2rem; margin-top: 2.5rem;
    flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem; font-weight: 900; color: var(--gold);
    display: block;
  }
  .stat-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--brown);
  }

  /* ─── DIVIDER ─── */
  .divider {
    display: flex; align-items: center; justify-content: center;
    padding: 1rem 4rem;
    gap: 1.5rem;
    color: var(--gold);
    font-size: 1.2rem;
  }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); }

  /* ─── BOOKS ─── */
  .books-section {
    padding: 6rem 4rem;
    background: linear-gradient(180deg, var(--cream) 0%, var(--parchment) 100%);
    position: relative;
  }
  .books-header { text-align: center; margin-bottom: 4rem; }
  .books-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 2.5rem;
    max-width: 1400px; margin: 0 auto;
  }
  .book-card {
    background: var(--cream);
    border: 1px solid rgba(184,134,11,0.2);
    position: relative; overflow: hidden;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    cursor: none;
  }
  .book-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 30px 60px rgba(26,18,8,0.15), 8px 8px 0 var(--gold);
  }
  .book-cover {
    height: 280px;
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .book-spine {
    position: absolute; left: 0; top: 0; bottom: 0; width: 40px;
    display: flex; align-items: center; justify-content: center;
  }
  .book-spine-text {
    writing-mode: vertical-rl; text-orientation: mixed;
    font-family: 'Playfair Display', serif; font-size: 0.7rem;
    font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--cream);
  }
  .book-cover-inner {
    flex: 1; height: 100%; margin-left: 40px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1.5rem;
    position: relative;
  }
  .book-cover-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; font-weight: 700; font-style: italic;
    text-align: center; color: var(--cream);
    margin-bottom: 0.5rem; line-height: 1.3;
  }
  .book-cover-author {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(245,240,232,0.7);
  }
  .book-cover-deco {
    position: absolute; top: 10px; right: 10px; bottom: 10px; left: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    pointer-events: none;
  }
  .book-info { padding: 1.5rem; }
  .book-genre {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.75rem; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 0.5rem;
  }
  .book-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; font-weight: 700;
    color: var(--dark); margin-bottom: 0.5rem;
  }
  .book-desc {
    font-family: 'EB Garamond', serif;
    font-size: 0.95rem; line-height: 1.7;
    color: var(--brown); margin-bottom: 1.2rem;
  }
  .book-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 1rem; border-top: 1px solid rgba(184,134,11,0.2);
  }
  .book-price {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; font-weight: 700; color: var(--burgundy);
  }
  .add-to-cart {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--cream); background: var(--dark);
    border: none; padding: 0.6rem 1.2rem;
    cursor: none; transition: background 0.3s;
  }
  .add-to-cart:hover { background: var(--burgundy); }
  .badge {
    position: absolute; top: 1rem; right: 1rem;
    background: var(--burgundy);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.3rem 0.7rem;
    z-index: 2;
  }

  /* ─── WHY US ─── */
  .why-section {
    padding: 8rem 4rem;
    max-width: 1400px; margin: 0 auto;
  }
  .why-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 3rem;
    margin-top: 4rem;
  }
  .why-card {
    text-align: center; padding: 3rem 2rem;
    border: 1px solid rgba(184,134,11,0.2);
    position: relative; overflow: hidden;
    transition: all 0.4s ease;
  }
  .why-card::before {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px; background: var(--gold); transform: scaleX(0);
    transition: transform 0.4s ease;
  }
  .why-card:hover::before { transform: scaleX(1); }
  .why-card:hover { background: rgba(184,134,11,0.04); }
  .why-icon {
    font-size: 2.5rem; margin-bottom: 1.5rem; display: block;
  }
  .why-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem; font-weight: 700;
    color: var(--dark); margin-bottom: 1rem;
  }
  .why-card p {
    font-family: 'EB Garamond', serif;
    font-size: 1rem; line-height: 1.8; color: var(--brown);
  }

  /* ─── TESTIMONIALS ─── */
  .testimonials {
    background: var(--dark);
    padding: 8rem 4rem;
    position: relative; overflow: hidden;
  }
  .testimonials::before {
    content: '"'; position: absolute; top: -2rem; left: 3rem;
    font-family: 'Playfair Display', serif;
    font-size: 20rem; color: rgba(184,134,11,0.08);
    line-height: 1; pointer-events: none;
  }
  .testimonials .section-title { color: var(--cream); }
  .testimonials .section-label { color: var(--gold-light); }
  .testimonials-header { text-align: center; margin-bottom: 4rem; }
  .testimonials-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem;
    max-width: 1200px; margin: 0 auto;
  }
  .testimonial-card {
    border: 1px solid rgba(184,134,11,0.2);
    padding: 2.5rem;
    position: relative;
    transition: border-color 0.3s;
  }
  .testimonial-card:hover { border-color: var(--gold); }
  .t-quote {
    font-family: 'Playfair Display', serif;
    font-size: 3rem; color: var(--gold); line-height: 1;
    margin-bottom: 1rem;
  }
  .t-text {
    font-family: 'EB Garamond', serif;
    font-size: 1.05rem; font-style: italic; line-height: 1.8;
    color: rgba(245,240,232,0.85); margin-bottom: 2rem;
  }
  .t-author {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--gold);
  }
  .t-stars { color: var(--gold-light); font-size: 0.9rem; margin-bottom: 1rem; }

  /* ─── CART MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 800;
    background: rgba(26,18,8,0.6);
    backdrop-filter: blur(4px);
    display: flex; align-items: flex-start; justify-content: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .cart-panel {
    width: 480px; max-width: 100vw;
    background: var(--cream);
    height: 100vh; overflow-y: auto;
    padding: 3rem 2.5rem;
    transform: translateX(100%);
    transition: transform 0.4s ease;
    position: relative;
  }
  .modal-overlay.open .cart-panel { transform: translateX(0); }
  .cart-close {
    position: absolute; top: 1.5rem; left: 1.5rem;
    font-family: 'Playfair Display', serif; font-size: 1.5rem;
    cursor: none; background: none; border: none; color: var(--dark);
    transition: color 0.3s;
  }
  .cart-close:hover { color: var(--gold); }
  .cart-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; font-weight: 700;
    color: var(--dark); margin-bottom: 2rem;
    padding-top: 1rem;
    border-bottom: 1px solid rgba(184,134,11,0.3);
    padding-bottom: 1rem;
  }
  .cart-item {
    display: flex; gap: 1rem; align-items: flex-start;
    padding: 1.2rem 0;
    border-bottom: 1px solid rgba(184,134,11,0.15);
    animation: fadeUp 0.3s ease both;
  }
  .cart-item-cover {
    width: 55px; height: 70px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    border: 1px solid rgba(184,134,11,0.3);
  }
  .cart-item-info { flex: 1; }
  .cart-item-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem; font-weight: 700; color: var(--dark);
    margin-bottom: 0.3rem;
  }
  .cart-item-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem; font-weight: 600; color: var(--burgundy);
  }
  .cart-item-remove {
    font-size: 0.8rem; cursor: none; background: none;
    border: none; color: rgba(26,18,8,0.4); transition: color 0.2s;
  }
  .cart-item-remove:hover { color: var(--burgundy); }
  .cart-empty {
    text-align: center; padding: 4rem 2rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem; font-style: italic; color: var(--brown);
  }
  .cart-empty-icon { font-size: 3rem; display: block; margin-bottom: 1rem; }
  .cart-total {
    margin-top: 2rem;
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.5rem 0;
    border-top: 2px solid var(--gold);
  }
  .cart-total-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--brown);
  }
  .cart-total-price {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem; font-weight: 700; color: var(--dark);
  }
  .checkout-btn {
    width: 100%;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--cream); background: var(--dark);
    border: none; padding: 1.2rem;
    cursor: none; margin-top: 1rem;
    transition: background 0.3s;
  }
  .checkout-btn:hover { background: var(--burgundy); }
  .upi-info {
    margin-top: 1.5rem;
    padding: 1rem;
    border: 1px solid rgba(184,134,11,0.3);
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
  }
  .upi-info p { font-size: 0.9rem; color: var(--brown); line-height: 1.6; }
  .upi-info strong { color: var(--dark); font-weight: 600; }

  /* ─── ORDER MODAL ─── */
  .order-modal {
    position: fixed; inset: 0; z-index: 900;
    background: rgba(26,18,8,0.7);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s;
  }
  .order-modal.open { opacity: 1; pointer-events: all; }
  .order-box {
    background: var(--cream);
    padding: 3.5rem;
    max-width: 550px; width: 90%;
    position: relative;
    transform: scale(0.9);
    transition: transform 0.4s ease;
    max-height: 90vh; overflow-y: auto;
  }
  .order-modal
